# SPDX-License-Identifier: CC-BY-SA-4.0
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  docs-lint:
    name: Docs / ADR sanity
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Verify ADR files have status
        run: |
          for f in docs/adr/*.md; do
            grep -q '\*\*Status:\*\*' "$f" || { echo "$f missing **Status:**" ; exit 1; }
          done
      - name: Verify SPDX license identifier
        run: |
          shopt -s globstar
          for f in **/*.md docs/**/*.md; do
            [ -f "$f" ] || continue
            grep -q "SPDX-License-Identifier" "$f" || { echo "$f missing SPDX header" ; exit 1; }
          done

  kicad-erc-drc:
    name: KiCad / ERC + DRC
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install KiCad CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends kicad
          kicad-cli --version
      - name: Run ERC on every .kicad_sch
        run: |
          set -euo pipefail
          shopt -s nullglob globstar
          rc=0
          found=0
          for f in kicad/**/*.kicad_sch; do
            [ -f "$f" ] || continue
            found=1
            echo "::group::ERC $f"
            kicad-cli sch erc \
              --output "/tmp/$(basename "$f").erc.rpt" \
              --exit-code-violations \
              "$f" || rc=$?
            cat "/tmp/$(basename "$f").erc.rpt" || true
            echo "::endgroup::"
          done
          if [ "$found" -eq 0 ]; then
            echo "no .kicad_sch files in tree; skipping ERC"
          fi
          exit "$rc"
      - name: Run DRC on every .kicad_pcb
        run: |
          set -euo pipefail
          shopt -s nullglob globstar
          rc=0
          found=0
          for f in kicad/**/*.kicad_pcb; do
            [ -f "$f" ] || continue
            found=1
            echo "::group::DRC $f"
            kicad-cli pcb drc \
              --output "/tmp/$(basename "$f").drc.rpt" \
              --exit-code-violations \
              "$f" || rc=$?
            cat "/tmp/$(basename "$f").drc.rpt" || true
            echo "::endgroup::"
          done
          if [ "$found" -eq 0 ]; then
            echo "no .kicad_pcb files in tree; skipping DRC"
          fi
          exit "$rc"
